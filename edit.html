<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>ICML Edit</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script>
    if (!sessionStorage.getItem('icml_gh')) {
      window.location.href = 'login.html';
    }
  </script>
</head>
<body class="admin-body">
  <header class="site-header">
    <div>
      <h1><a href="admin.html">ICML</a> <span class="admin-badge">Admin</span></h1>
    </div>
    <nav class="header-nav"><a href="admin.html" class="btn-link">&larr; List</a></nav>
  </header>

  <div class="admin-split">
    <!-- Left: form -->
    <div class="admin-left">
      <form id="cafe-form">
        <input type="hidden" id="cafe-id">
        <div class="form-group">
          <label for="cafe-naver-link">Naver Map Link</label>
          <div class="input-with-btn">
            <input type="url" id="cafe-naver-link" placeholder="https://map.naver.com/...">
            <button type="button" id="naver-search-btn" class="btn-icon" aria-label="Load from link">&#8599;</button>
          </div>
        </div>
        <div class="form-group">
          <label for="cafe-name">Name</label>
          <input type="text" id="cafe-name" required>
        </div>
        <div class="form-group">
          <label>Location</label>
          <div class="input-with-btn">
            <small id="coords-display">No location selected</small>
            <button type="button" id="use-current-location" class="btn-icon" aria-label="Use current location" title="Use current location">&#9678;</button>
          </div>
        </div>
        <div class="form-group">
          <label for="cafe-date">Visit Date</label>
          <input type="date" id="cafe-date" required>
        </div>
        <div class="rating-row">
          <div class="rating-group">
            <span class="rating-icon" title="Taste of coffee">&#9749;</span>
            <div class="rating-buttons" id="rating-buttons">
              <button type="button" data-value="1">1</button>
              <button type="button" data-value="2">2</button>
              <button type="button" data-value="3">3</button>
              <button type="button" data-value="4">4</button>
              <button type="button" data-value="5">5</button>
            </div>
            <input type="hidden" id="cafe-rating">
          </div>
          <div class="rating-group">
            <span class="rating-icon" title="Music selection and speaker quality">&#9835;</span>
            <div class="rating-buttons" id="music-rating-buttons">
              <button type="button" data-value="1">1</button>
              <button type="button" data-value="2">2</button>
              <button type="button" data-value="3">3</button>
              <button type="button" data-value="4">4</button>
              <button type="button" data-value="5">5</button>
            </div>
            <input type="hidden" id="cafe-music-rating">
          </div>
          <div class="rating-group">
            <span class="rating-icon" title="How good it is for studying or working">&#9997;</span>
            <div class="rating-buttons" id="study-rating-buttons">
              <button type="button" data-value="1">1</button>
              <button type="button" data-value="2">2</button>
              <button type="button" data-value="3">3</button>
              <button type="button" data-value="4">4</button>
              <button type="button" data-value="5">5</button>
            </div>
            <input type="hidden" id="cafe-study-rating">
          </div>
        </div>
        <div class="form-group">
          <label for="cafe-tags">Tags (comma-separated)</label>
          <input type="text" id="cafe-tags" placeholder="jazz, vinyl, quiet, good-for-reading">
        </div>
        <div class="form-group">
          <label for="cafe-description">Notes</label>
          <textarea id="cafe-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Photos</label>
          <div id="photo-upload-area" class="photo-upload-area">
            <span class="upload-icon">+</span>
            <span>Drop images or click to upload</span>
            <input type="file" id="cafe-photos" accept="image/*" multiple>
          </div>
          <div id="photo-preview" class="photo-preview"></div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="admin.html" class="btn">Cancel</a>
        </div>
      </form>
    </div>

    <!-- Right: map -->
    <div class="admin-right">
      <div id="admin-map"></div>
      <button id="admin-locate-btn" class="map-locate-btn" aria-label="Current location">&#9678;</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/gh.js"></script>
  <script src="js/edit.js"></script>
</body>
</html>
